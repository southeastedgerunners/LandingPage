name: Backend CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build .NET Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore and Build
        run: |
          dotnet restore api/EdgeRunners.Api
          dotnet build api/EdgeRunners.Api -c Release --no-restore

      - name: Publish
        run: |
          dotnet publish api/EdgeRunners.Api -c Release -o publish

      - name: Build Docker image and push to ACR
        if: env.ACR_LOGIN_SERVER != ''
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        run: |
          echo $ACR_PASSWORD | docker login $ACR_LOGIN_SERVER -u $ACR_USERNAME --password-stdin
          docker build -t $ACR_LOGIN_SERVER/edgerunners-api:latest api
          docker push $ACR_LOGIN_SERVER/edgerunners-api:latest

      - name: Run tests (if any)
        if: always()
        run: |
          echo "No tests configured for backend"

      - name: Deploy to Azure Web App for Containers (manual steps)
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Set up Azure deployment using secrets and az cli in your environment."
