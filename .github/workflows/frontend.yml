name: Frontend CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_N8N_WEBHOOK_URL: ${{ secrets.VITE_N8N_WEBHOOK_URL }}
        run: npm run build

      - name: Run tests (if any)
        if: always()
        run: |
          if [ -f package.json ] && grep -q "test" package.json; then
            npm test --if-present --silent || true
          else
            echo "No tests configured"
          fi

      - name: Deploy to Netlify (on push to main)
        if: github.ref == 'refs/heads/main'
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          npm i -g netlify-cli --no-fund --no-audit
          npx netlify deploy --dir=dist --prod --site="$NETLIFY_SITE_ID"
